server:
  port: 8080

spring:
  application:
    name: imageboard-backend

  # Matches the "postgres" service in docker-compose.yml at the project root.
  # Run `docker compose up -d` before starting the backend.
  datasource:
    url: jdbc:postgresql://localhost:5433/imageboard
    username: imageboard
    password: imageboard
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update   # fine for a classroom assignment; not for production
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Allow the Vite dev server (default port 5173) to call the API during local development.
app:
  cors:
    allowed-origins: http://localhost:5173
